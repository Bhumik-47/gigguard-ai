<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GigGuard AI — Gateway</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="additional.css" />
    <style>
        /* Specific layout for the landing/login entry */
        .gateway-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-base);
            position: relative;
            overflow: hidden;
        }

        /* Re-using your glow effects for the index */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(245,165,35,0.08) 0%, transparent 70%); top: -100px; left: -100px; }
        .glow-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(78, 158, 255, 0.06) 0%, transparent 70%); bottom: -50px; right: -50px; }

        .content-frame {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeUp 0.6s ease out;
        }

        .welcome-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .logo-large {
            margin-bottom: 24px;
            display: inline-block;
        }

        .btn-enter {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--amber) 0%, #ff8c3a 100%);
            color: #0a0c10;
            text-decoration: none;
            font-family: var(--font-display);
            font-weight: 800;
            border-radius: var(--radius-sm);
            margin-top: 24px;
            transition: transform 0.2s, opacity 0.2s;
            letter-spacing: 0.05em;
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .nav-map {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .nav-map a {
            font-size: 11px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .nav-map a:hover {
            border-color: var(--amber-dim);
            color: var(--amber);
        }
    </style>
</head>
<body>
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>

    <div class="gateway-container">
        <div class="content-frame">
            <div class="welcome-card">
                <div class="logo-large">
                    <svg width="60" height="60" viewBox="0 0 40 40" fill="none">
                        <path d="M20 2L5 8.5V19C5 28 11.5 36.5 20 39C28.5 36.5 35 28 35 19V8.5L20 2Z" fill="#f5a523" fill-opacity="0.15" stroke="#f5a523" stroke-width="1.5" />
                        <path d="M13.5 20L18 24.5L26.5 14" stroke="#f5a523" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h1 style="font-family: var(--font-display); font-size: 24px; margin-bottom: 8px;">GigGuard <span style="color:var(--amber)">AI</span></h1>
                <p style="color: var(--text-secondary); font-size: 14px;">Parametric Insurance for the Gig Economy</p>
                
                <a href="login.html" class="btn-enter">OPEN WORKER PORTAL</a>

                <div class="nav-map">
                    <a href="dashboard.html">Dashboard</a>
                    <a href="risk-monitor.html">Risk Monitor</a>
                    <a href="payout.html">Payout Sim</a>
                    <a href="login.html">Logout / Login</a>
                </div>
            </div>
            
            <p style="text-align:center; font-size: 10px; color: var(--text-muted); margin-top: 20px; letter-spacing: 0.1em;">
                HACKATHON 2025 · AI ENGINE ONLINE
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
