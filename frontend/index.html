<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GigGuard AI — Worker Portal</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="additional.css" />
    <style>
        /* Fallback Styles in case CSS is missing */
        body { background: #0a0c10; color: #eef1f7; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #11141b; padding: 40px; border-radius: 20px; border: 1px solid #1e2530; width: 100%; max-width: 400px; text-align: center; }
        .brand { font-weight: 800; font-size: 24px; margin-bottom: 20px; color: #f5a523; }
        .form-group { margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 12px; background: #0a0c10; border: 1px solid #1e2530; color: white; border-radius: 8px; margin-top: 5px; box-sizing: border-box;}
        .btn-login { width: 100%; padding: 14px; background: #f5a523; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: #0a0c10; margin-top: 10px; }
        .demo-box { background: rgba(78, 158, 255, 0.1); border: 1px solid #4e9eff; padding: 15px; border-radius: 8px; font-size: 12px; margin-bottom: 20px; color: #4e9eff; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">GigGuard AI</div>
        
        <div class="demo-box">
            <strong>Hackathon Demo:</strong> Use Worker ID <b>SWG-09124</b> to access the dashboard.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Worker ID</label>
                <input type="text" id="workerId" value="SWG-09124" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="demo2026" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In to Dashboard</button>
        </form>

        <p id="errorMsg" style="color: #ff4b5c; font-size: 12px; margin-top: 10px; display: none;">Invalid credentials.</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const wid = document.getElementById('workerId').value;

            // Show loading state
            btn.innerText = "Authenticating...";
            btn.disabled = true;

            // Logic: Bypass local API for Vercel demo
            setTimeout(() => {
                if (wid === "SWG-09124") {
                    // Save session so other pages work
                    sessionStorage.setItem('gigguard_auth', 'true');
                    sessionStorage.setItem('gigguard_worker_id', wid);
                    
                    // REDIRECT (Ensure dashboard.html is in the same folder as this file!)
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    btn.innerText = "Sign In to Dashboard";
                    btn.disabled = false;
                }
            }, 1000);
        });
    </script>
</body>
</html>
