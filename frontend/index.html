<script>
    // 1. Pre-check: If already authenticated, skip login and go to dashboard
    // Use window.location.replace to prevent the login page from staying in history
    if (sessionStorage.getItem('gigguard_auth') === 'true') {
        window.location.replace('dashboard.html');
    }

    const $ = id => document.getElementById(id);

    // Password show/hide toggle
    $('pwToggle').addEventListener('click', function () {
        const inp = $('password');
        const isText = inp.type === 'text';
        inp.type = isText ? 'password' : 'text';
        this.textContent = isText ? '👁' : '🙈';
    });

    // Demo quick-fill helper
    $('demoBtn').addEventListener('click', function () {
        $('workerId').value = 'SWG-09124';
        $('password').value = 'demo2025';
        // Trigger the submit event programmatically
        $('loginForm').dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
    });

    // Main Form Submission Logic
    $('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const wid = $('workerId').value.trim();
        const pw = $('password').value.trim();

        // Reset error states
        $('formError').classList.remove('visible');

        if (!wid || !pw) {
            $('formError').textContent = 'Please enter both Worker ID and password.';
            $('formError').classList.add('visible');
            return;
        }

        // Show loading state on the button
        const btn = $('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="btn-spinner"></span>Authenticating...';

        // Simulate a network delay for authentication
        setTimeout(function () {
            // Set the session storage keys that script.js looks for
            sessionStorage.setItem('gigguard_auth', 'true');
            sessionStorage.setItem('gigguard_worker_id', wid);

            // Update UI to show success
            $('loginForm').style.display = 'none';
            $('loginSuccess').classList.add('visible');

            // Final Redirect: Ensure this filename is exactly 'dashboard.html' 
            // on your file system (no double .html.html)
            setTimeout(function () {
                window.location.href = 'dashboard.html';
            }, 900);
        }, 1100);
    });
</script>
