<script>
    // 1. Skip login if already authenticated
    if (sessionStorage.getItem('gigguard_auth') === 'true') {
        window.location.replace('dashboard.html');
    }

    const $ = id => document.getElementById(id);

    // 2. Demo Autofill
    if ($('demoBtn')) {
        $('demoBtn').addEventListener('click', () => {
            $('workerId').value = 'SWG-09124';
            $('password').value = 'demo2025';
            $('loginForm').dispatchEvent(new Event('submit'));
        });
    }

    // 3. Login Submission
    $('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const btn = $('loginBtn');
        btn.disabled = true;
        btn.innerHTML = 'Authenticating...';

        setTimeout(() => {
            // Set the flags your script.js looks for
            sessionStorage.setItem('gigguard_auth', 'true');
            sessionStorage.setItem('gigguard_worker_id', $('workerId').value);
            
            $('loginForm').style.display = 'none';
            $('loginSuccess').classList.add('visible');

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 800);
        }, 1000);
    });
</script>
