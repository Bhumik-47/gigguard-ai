name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test Backend (Python ${{ matrix.python-version }})

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio fastapi httpx pydantic

      - name: Run unit tests
        run: pytest tests/ -v --cov=backend --cov-report=term-missing --cov-fail-under=80

      - name: Run integration tests
        run: pytest tests/test_api_integration.py -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    name: Lint and Format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check formatting with black
        run: black --check backend tests

      - name: Check import ordering with isort
        run: isort --check-only backend tests

      - name: Run flake8 linter
        run: flake8 backend tests --count --select=E9,F63,F7,F82 --show-source --statistics

  security:
    runs-on: ubuntu-latest
    name: Security Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security check
        run: bandit -r backend -f json -o bandit-report.json || true

      - name: Check dependencies for vulnerabilities
        run: safety check || true

  build:
    runs-on: ubuntu-latest
    name: Build and Test Docker Image
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: gigguard-ai:latest

  deployment-readiness:
    runs-on: ubuntu-latest
    name: Check Deployment Readiness
    needs: [test, lint, security, build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify all checks passed
        run: |
          echo "All CI checks passed successfully"
          echo "Ready for deployment"

      - name: Create deployment checklist
        run: |
          echo "Deployment Checklist:"
          echo "- Unit tests: PASSED"
          echo "- Integration tests: PASSED"
          echo "- Linting: PASSED"
          echo "- Security: PASSED"
          echo "- Build: PASSED"
          echo "- Code coverage: >80%"
